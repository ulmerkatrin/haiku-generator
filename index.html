<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>Haiku generator</title>
</head>
<body>
    <header class="site-header">
    <h1 class="site-title">Welcome to the haiku generator</h1>
    </header>
    <main class="main-content">
        <section class="form-section">
        <form class="haiku-form">
            <input class="keyword-input" type="text" placeholder="Enter your keyword" autofocus required autocomplete="off" />
            <button class="submit-btn" type="submit">Generate</button>
        </form>
        </section>
        <section class="haiku-section">
            <div class="haiku-card" id="haiku-output">
                <p class="haiku-placeholder" The haiku will go here></p>
            </div>
        </section>
        </main>
        
    <br>
    <br>
    <footer class="site-footer">
        <p>
        Brought to you by
        <a href="https://github.com/ulmerkatrin" target="_blank">Katrin Ulmer</a> and is
        <a href="https://github.com/ulmerkatrin/githubhomework" target="_blank"> on GitHub</a> and
        <a href="https://makeahaiku.netlify.app/" target="_blank">hosted on Netlify</a>
        </p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="src/index.js"></script>
</body>
</html>
